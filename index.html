<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunic Dining — Coming Soon</title>
  <meta name="description" content="Yunic Dining — A private Indonesian dining experience in Bali. Coming soon.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown: #2e1a08;
      --terracotta: #b8522a;
      --saffron: #c8922a;
      --parchment: #f5f0e8;
      --brown-muted: #8c6848;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Jost', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--brown);
      color: var(--parchment);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(184,82,42,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(200,146,42,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 540px;
      width: 100%;
    }

    /* Logo */
    .logo-wrap {
      margin-bottom: 2.5rem;
    }
    .logo-wordmark {
      font-family: var(--serif);
      font-size: 1.1rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--saffron);
      font-weight: 400;
    }
    .logo-sub {
      font-family: var(--sans);
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--brown-muted);
      margin-top: 0.2rem;
    }
    .logo-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 0.4rem 0;
    }
    .logo-rule span {
      height: 1px;
      width: 28px;
      background: var(--saffron);
      opacity: 0.5;
      display: block;
    }
    .logo-rule i {
      color: var(--saffron);
      font-style: normal;
      font-size: 0.45rem;
      opacity: 0.6;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(200,146,42,0.4);
      margin: 2rem auto;
    }

    /* Heading */
    h1 {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 8vw, 4rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--parchment);
      letter-spacing: 0.02em;
      margin-bottom: 1.2rem;
    }
    h1 em {
      font-style: italic;
      color: var(--saffron);
    }

    p {
      font-family: var(--sans);
      font-size: 0.88rem;
      color: rgba(245,240,232,0.65);
      line-height: 1.8;
      letter-spacing: 0.04em;
      margin-bottom: 2.5rem;
    }

    /* Contact links */
    .contact-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }
    .contact-label {
      font-family: var(--sans);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown-muted);
      margin-bottom: 0.4rem;
    }
    .contact-links a {
      font-family: var(--sans);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--parchment);
      text-decoration: none;
      border-bottom: 1px solid rgba(245,240,232,0.2);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .contact-links a:hover {
      color: var(--saffron);
      border-color: var(--saffron);
    }
    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #25D366;
      color: #fff !important;
      border: none !important;
      border-radius: 3px;
      padding: 0.65rem 1.4rem;
      font-size: 0.72rem !important;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }
    .wa-btn:hover { opacity: 0.9; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(140,104,72,0.5);
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-wrap">
      <div class="logo-wordmark">Yunic</div>
      <div class="logo-rule">
        <span></span><i>◆</i><span></span>
      </div>
      <div class="logo-sub">Dining</div>
    </div>

    <div class="divider"></div>

    <h1>Something<br><em>beautiful</em><br>is coming</h1>

    <p>
      A private Indonesian dining experience,<br>
      brought to your home in Bali.<br>
      We'll be ready soon.
    </p>

    <div class="contact-links">
      <div class="contact-label">In the meantime, reach us at</div>
      <a href="mailto:yunicdining@gmail.com">yunicdining@gmail.com</a>

  </div>

  <footer>© Yunic Dining · Bali, Indonesia</footer>
</body>
</html>

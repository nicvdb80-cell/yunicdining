<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yunic Dining — Coming Soon</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:  #0D2C22;
  --bronze: #A3704C;
  --cream:  #F5F0E6;
  --brown:  #3B2A1A;
}
html, body {
  height: 100%;
  background: var(--cream);
  color: var(--brown);
  font-family: "Plus Jakarta Sans", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.wrap {
  text-align: center;
  padding: 3rem 2rem;
  max-width: 480px;
}
.logo {
  width: 90px;
  height: auto;
  margin-bottom: 2.4rem;
  opacity: 0.92;
}
.divider {
  width: 48px;
  height: 1px;
  background: var(--bronze);
  margin: 1.8rem auto;
  opacity: 0.4;
}
h1 {
  font-family: "Cinzel Decorative", serif;
  font-size: clamp(1.05rem, 3vw, 1.3rem);
  font-weight: 400;
  color: var(--green);
  letter-spacing: 0.06em;
  line-height: 1.6;
}
p {
  font-size: 0.88rem;
  line-height: 1.95;
  color: #7a6248;
  margin-bottom: 0;
}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="https://raw.githubusercontent.com/nicvdb80-cell/yunicdining/main/assets/img11.png" alt="Yunic Dining">
  <h1>We are getting ready.</h1>
  <div class="divider"></div>
  <p>Something beautiful is coming to Bali.</p>
</div>
</body>
</html>

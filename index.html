<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yunic Dining</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#E4E1DB;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:"DM Sans",sans-serif}
.logo{font-family:"Italiana",serif;font-size:clamp(28px,5vw,42px);letter-spacing:.18em;color:#0D2C22;margin-bottom:clamp(28px,5vw,48px)}
.line{width:40px;height:1px;background:rgba(163,112,76,.5);margin:0 auto clamp(28px,5vw,48px)}
.text{font-size:clamp(14px,1.6vw,18px);line-height:1.7;color:#6F6254;text-align:center;max-width:38ch;font-weight:300;letter-spacing:.01em}
</style>
</head>
<body>
<p class="logo">YUNIC</p>
<div class="line"></div>
<p class="text">We have been quietly building something we truly believe in.</p>
</body>
</html>
